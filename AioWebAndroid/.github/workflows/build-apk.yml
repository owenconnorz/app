name: Build APK (Debug + Signed Release)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ---------- Decode the release keystore from GitHub Secrets ----------
      # Required secrets (Settings → Secrets and variables → Actions):
      #   KEYSTORE_BASE64    – `base64 -w0 release.keystore` of your .keystore file
      #   KEYSTORE_PASSWORD  – store password
      #   KEY_ALIAS          – key alias
      #   KEY_PASSWORD       – key password (often same as store password)
      - name: Decode release keystore
        id: keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> $GITHUB_ENV
          echo "has_keystore=true" >> $GITHUB_OUTPUT

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Release APK (signed if secrets present)
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Collect APK artifacts
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/app-debug.apk \
             "artifacts/AioWeb-debug-${{ github.run_number }}.apk" || true
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk \
               "artifacts/AioWeb-release-signed-${{ github.run_number }}.apk"
          elif [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            cp app/build/outputs/apk/release/app-release-unsigned.apk \
               "artifacts/AioWeb-release-UNSIGNED-${{ github.run_number }}.apk"
          fi
          ls -la artifacts/

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AioWeb-apks
          path: artifacts/*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: AioWeb Build ${{ github.run_number }}
          files: artifacts/*.apk
          prerelease: true
          body: |
            Auto-built APKs from commit ${{ github.sha }}.
            
            - **AioWeb-debug-*.apk** — debug build, sideload-only.
            - **AioWeb-release-signed-*.apk** — production-signed release (only present if release keystore secrets are configured).
            - **AioWeb-release-UNSIGNED-*.apk** — produced when no keystore secrets exist; cannot be installed until signed.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
