name: Build AioWeb Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'AioWebAndroid/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'AioWebAndroid/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: AioWebAndroid

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: wrapper

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('AioWebAndroid/**/*.gradle*', 'AioWebAndroid/**/gradle-wrapper.properties') }}

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Decode release keystore (optional)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        continue-on-error: true
        run: |
          printf '%s' "$KEYSTORE_BASE64" | tr -d '[:space:]' | base64 -di > "$RUNNER_TEMP/release.keystore" 2>/dev/null
          SIZE=$(stat -c%s "$RUNNER_TEMP/release.keystore" 2>/dev/null || echo 0)
          if [ "$SIZE" -gt 1000 ]; then
            echo "KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> $GITHUB_ENV
            echo "Keystore decoded OK ($SIZE bytes)"
          else
            echo "::warning::Invalid keystore. Release APK will be unsigned."
            rm -f "$RUNNER_TEMP/release.keystore"
          fi

      - name: Build Debug + Release APKs
        run: ./gradlew assembleDebug assembleRelease --no-daemon --stacktrace

      - name: Collect APK artifacts
        run: |
          mkdir -p artifacts

          # Debug
          cp app/build/outputs/apk/debug/app-debug.apk \
             "artifacts/AioWeb-debug-${{ github.run_number }}.apk" || true

          # Release (signed or unsigned)
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk \
               "artifacts/AioWeb-release-${{ github.run_number }}.apk"
          elif [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            cp app/build/outputs/apk/release/app-release-unsigned.apk \
               "artifacts/AioWeb-release-UNSIGNED-${{ github.run_number }}.apk"
          fi

          ls -la artifacts/

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: AioWeb-APKs
          path: artifacts/*.apk
          retention-days: 30