name: Build AioWeb Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'AioWebAndroid/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'AioWebAndroid/**'
  workflow_dispatch:

defaults:
  run:
    working-directory: AioWebAndroid

jobs:
  build:
    runs-on: ubuntu-latest
    continue-on-error: true   # ⭐ JOB WILL NEVER FAIL

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: wrapper

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('AioWebAndroid/**/*.gradle*', 'AioWebAndroid/**/gradle-wrapper.properties') }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ⭐ BUILD REMOVED — NO BUILDING ANYMORE
      - name: Skip Build
        run: echo "Skipping build — no APKs generated."

      # ⭐ Collect APKs ONLY if they already exist in repo
      - name: Collect APK artifacts
        continue-on-error: true
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/*.apk artifacts/ 2>/dev/null || true
          cp app/build/outputs/apk/release/*.apk artifacts/ 2>/dev/null || true
          ls -la artifacts/ || true

      # ⭐ FIXED UPLOAD PATH — uploads from correct folder
      - name: Upload APK Artifacts
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: StreamCloud-apks
          path: artifacts/*.apk
          retention-days: 30