name: Build AioWeb Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'AioWebAndroid/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'AioWebAndroid/**'
  workflow_dispatch:

defaults:
  run:
    working-directory: AioWebAndroid

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle (with caching + retry on transient CDN failures)
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Cache Gradle
        uses: actions/cache@v4
        with: