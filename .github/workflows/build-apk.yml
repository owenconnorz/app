name: Build AioWeb Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'AioWebAndroid/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'AioWebAndroid/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      # 🔥 Correct working directory:
      # /home/runner/work/app/app/AioWebAndroid
      - name: Move into Android project
        run: cd AioWebAndroid
        shell: bash

      - name: Clear Gradle cache
        run: rm -rf ~/.gradle/caches

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Grant execute permission for gradlew
        run: chmod +x AioWebAndroid/gradlew

      - name: Build Debug APK
        run: cd AioWebAndroid && ./gradlew assembleDebug --stacktrace

      - name: Build Release APK
        run: cd AioWebAndroid && ./gradlew assembleRelease --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v7
        with:
          name: app-debug
          path: AioWebAndroid/app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v7
        with:
          name: app-release
          path: AioWebAndroid/app/build/outputs/apk/release/*.apk